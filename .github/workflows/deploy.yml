name: Deploy

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            app:
                description: "App to deploy"
                required: true
                type: choice
                options:
                    - all
                    - web
                    - landing
                    - api

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: false

env:
    RESOURCE_GROUP: rg-skinory
    ACR_NAME: ${{ secrets.ACR_NAME }}
    ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            web: ${{ steps.filter.outputs.web }}
            landing: ${{ steps.filter.outputs.landing }}
            api: ${{ steps.filter.outputs.api }}
        steps:
            - uses: actions/checkout@v4

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      web:
                        - 'apps/web/**'
                        - 'packages/**'
                        - 'pnpm-lock.yaml'
                      landing:
                        - 'apps/landing/**'
                        - 'packages/**'
                        - 'pnpm-lock.yaml'
                      api:
                        - 'apps/api/**'
                        - 'packages/core/**'
                        - 'pnpm-lock.yaml'

    deploy-api:
        name: Deploy API
        runs-on: ubuntu-latest
        needs: [changes]
        if: >-
            github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == 'api')
            || (github.event_name == 'push' && needs.changes.outputs.api == 'true')
        steps:
            - uses: actions/checkout@v4

            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Log in to ACR
              run: az acr login --name ${{ env.ACR_NAME }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push API
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/api/Dockerfile
                  push: true
                  tags: |
                      ${{ env.ACR_LOGIN_SERVER }}/skinory/api:${{ github.sha }}
                      ${{ env.ACR_LOGIN_SERVER }}/skinory/api:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Deploy to Container Apps
              run: |
                  az containerapp update \
                    --name skinory-api \
                    --resource-group ${{ env.RESOURCE_GROUP }} \
                    --image ${{ env.ACR_LOGIN_SERVER }}/skinory/api:${{ github.sha }}

    deploy-web:
        name: Deploy Web
        runs-on: ubuntu-latest
        needs: [changes]
        if: >-
            github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == 'web')
            || (github.event_name == 'push' && needs.changes.outputs.web == 'true')
        steps:
            - uses: actions/checkout@v4

            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Log in to ACR
              run: az acr login --name ${{ env.ACR_NAME }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Web
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/web/Dockerfile
                  push: true
                  tags: |
                      ${{ env.ACR_LOGIN_SERVER }}/skinory/web:${{ github.sha }}
                      ${{ env.ACR_LOGIN_SERVER }}/skinory/web:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Deploy to Container Apps
              run: |
                  az containerapp update \
                    --name skinory-web \
                    --resource-group ${{ env.RESOURCE_GROUP }} \
                    --image ${{ env.ACR_LOGIN_SERVER }}/skinory/web:${{ github.sha }}

    deploy-landing:
        name: Deploy Landing
        runs-on: ubuntu-latest
        needs: [changes]
        if: >-
            github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == 'landing')
            || (github.event_name == 'push' && needs.changes.outputs.landing == 'true')
        steps:
            - uses: actions/checkout@v4

            - name: Log in to Azure
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: Log in to ACR
              run: az acr login --name ${{ env.ACR_NAME }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Landing
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/landing/Dockerfile
                  push: true
                  tags: |
                      ${{ env.ACR_LOGIN_SERVER }}/skinory/landing:${{ github.sha }}
                      ${{ env.ACR_LOGIN_SERVER }}/skinory/landing:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Deploy to Container Apps
              run: |
                  az containerapp update \
                    --name skinory-landing \
                    --resource-group ${{ env.RESOURCE_GROUP }} \
                    --image ${{ env.ACR_LOGIN_SERVER }}/skinory/landing:${{ github.sha }}

    notify:
        name: Slack Notification
        runs-on: ubuntu-latest
        needs: [deploy-api, deploy-web, deploy-landing]
        if: always()
        steps:
            - name: Determine status
              id: status
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
                    echo "result=failure" >> $GITHUB_OUTPUT
                    echo "color=danger" >> $GITHUB_OUTPUT
                    echo "emoji=🔴" >> $GITHUB_OUTPUT
                  elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
                    echo "result=cancelled" >> $GITHUB_OUTPUT
                    echo "color=warning" >> $GITHUB_OUTPUT
                    echo "emoji=⚠️" >> $GITHUB_OUTPUT
                  else
                    echo "result=success" >> $GITHUB_OUTPUT
                    echo "color=good" >> $GITHUB_OUTPUT
                    echo "emoji=✅" >> $GITHUB_OUTPUT
                  fi

            - name: Send Slack notification
              uses: slackapi/slack-github-action@v2.1.0
              with:
                  webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                  webhook-type: incoming-webhook
                  payload: |
                      {
                        "attachments": [
                          {
                            "color": "${{ steps.status.outputs.color }}",
                            "blocks": [
                              {
                                "type": "header",
                                "text": {
                                  "type": "plain_text",
                                  "text": "${{ steps.status.outputs.emoji }} Deploy Pipeline — ${{ steps.status.outputs.result }}"
                                }
                              },
                              {
                                "type": "section",
                                "fields": [
                                  { "type": "mrkdwn", "text": "*Repo:*\n${{ github.repository }}" },
                                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                                  { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                                  { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                                ]
                              },
                              {
                                "type": "section",
                                "fields": [
                                  { "type": "mrkdwn", "text": "*API:* ${{ needs.deploy-api.result }}" },
                                  { "type": "mrkdwn", "text": "*Web:* ${{ needs.deploy-web.result }}" },
                                  { "type": "mrkdwn", "text": "*Landing:* ${{ needs.deploy-landing.result }}" }
                                ]
                              },
                              {
                                "type": "actions",
                                "elements": [
                                  {
                                    "type": "button",
                                    "text": { "type": "plain_text", "text": "View Run" },
                                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                  }
                                ]
                              }
                            ]
                          }
                        ]
                      }
