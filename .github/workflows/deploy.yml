name: Deploy

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            app:
                description: "App to deploy"
                required: true
                type: choice
                options:
                    - all
                    - web
                    - landing

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: false

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ${{ github.repository }}

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            web: ${{ steps.filter.outputs.web }}
            landing: ${{ steps.filter.outputs.landing }}
        steps:
            - uses: actions/checkout@v4

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      web:
                        - 'apps/web/**'
                        - 'packages/**'
                        - 'pnpm-lock.yaml'
                      landing:
                        - 'apps/landing/**'
                        - 'packages/**'
                        - 'pnpm-lock.yaml'

    deploy-web:
        name: Deploy Web
        runs-on: ubuntu-latest
        needs: [changes]
        if: >-
            github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == 'web')
            || (github.event_name == 'push' && needs.changes.outputs.web == 'true')
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/web
                  tags: |
                      type=sha,prefix=
                      type=ref,event=branch
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/web/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy-landing:
        name: Deploy Landing
        runs-on: ubuntu-latest
        needs: [changes]
        if: >-
            github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == 'landing')
            || (github.event_name == 'push' && needs.changes.outputs.landing == 'true')
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/landing
                  tags: |
                      type=sha,prefix=
                      type=ref,event=branch
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/landing/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    notify:
        name: Slack Notification
        runs-on: ubuntu-latest
        needs: [deploy-web, deploy-landing]
        if: always()
        steps:
            - name: Determine status
              id: status
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
                    echo "result=failure" >> $GITHUB_OUTPUT
                    echo "color=danger" >> $GITHUB_OUTPUT
                    echo "emoji=🔴" >> $GITHUB_OUTPUT
                  elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
                    echo "result=cancelled" >> $GITHUB_OUTPUT
                    echo "color=warning" >> $GITHUB_OUTPUT
                    echo "emoji=⚠️" >> $GITHUB_OUTPUT
                  else
                    echo "result=success" >> $GITHUB_OUTPUT
                    echo "color=good" >> $GITHUB_OUTPUT
                    echo "emoji=✅" >> $GITHUB_OUTPUT
                  fi

            - name: Send Slack notification
              uses: slackapi/slack-github-action@v2.1.0
              with:
                  webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                  webhook-type: incoming-webhook
                  payload: |
                      {
                        "attachments": [
                          {
                            "color": "${{ steps.status.outputs.color }}",
                            "blocks": [
                              {
                                "type": "header",
                                "text": {
                                  "type": "plain_text",
                                  "text": "${{ steps.status.outputs.emoji }} Deploy Pipeline — ${{ steps.status.outputs.result }}"
                                }
                              },
                              {
                                "type": "section",
                                "fields": [
                                  { "type": "mrkdwn", "text": "*Repo:*\n${{ github.repository }}" },
                                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                                  { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                                  { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                                ]
                              },
                              {
                                "type": "section",
                                "fields": [
                                  { "type": "mrkdwn", "text": "*Web:* ${{ needs.deploy-web.result }}" },
                                  { "type": "mrkdwn", "text": "*Landing:* ${{ needs.deploy-landing.result }}" }
                                ]
                              },
                              {
                                "type": "actions",
                                "elements": [
                                  {
                                    "type": "button",
                                    "text": { "type": "plain_text", "text": "View Run" },
                                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                  }
                                ]
                              }
                            ]
                          }
                        ]
                      }
