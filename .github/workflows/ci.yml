name: CI

on:
    pull_request:
    push:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    checks:
        name: Lint & Typecheck
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [checks]
        timeout-minutes: 15
        strategy:
            matrix:
                app: [web, landing]
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Build ${{ matrix.app }}
              run: pnpm build:${{ matrix.app }}

    e2e:
        name: E2E (${{ matrix.app }})
        runs-on: ubuntu-latest
        needs: [checks]
        timeout-minutes: 25
        strategy:
            matrix:
                app: [web, landing]
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Install Cypress system deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk2.0-0t64 libgtk-3-0t64 libgbm-dev libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb

            - name: Run E2E (${{ matrix.app }})
              run: pnpm e2e:${{ matrix.app }}

            - name: Upload Cypress artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: cypress-${{ matrix.app }}-artifacts
                  path: |
                      apps/e2e/cypress/screenshots
                      apps/e2e/cypress/videos
                  retention-days: 7

    docker:
        name: Docker Build (${{ matrix.app }})
        runs-on: ubuntu-latest
        needs: [build]
        timeout-minutes: 20
        strategy:
            matrix:
                app: [web, landing]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/${{ matrix.app }}/Dockerfile
                  push: false
                  tags: skinory-${{ matrix.app }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    notify:
        name: Slack Notification
        runs-on: ubuntu-latest
        needs: [checks, build, e2e, docker]
        if: always()
        steps:
            - name: Determine status
              id: status
              run: |
                  if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
                    echo "result=failure" >> $GITHUB_OUTPUT
                    echo "color=danger" >> $GITHUB_OUTPUT
                    echo "emoji=🔴" >> $GITHUB_OUTPUT
                  elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
                    echo "result=cancelled" >> $GITHUB_OUTPUT
                    echo "color=warning" >> $GITHUB_OUTPUT
                    echo "emoji=⚠️" >> $GITHUB_OUTPUT
                  else
                    echo "result=success" >> $GITHUB_OUTPUT
                    echo "color=good" >> $GITHUB_OUTPUT
                    echo "emoji=✅" >> $GITHUB_OUTPUT
                  fi

            - name: Send Slack notification
              uses: slackapi/slack-github-action@v2.1.0
              with:
                  webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                  webhook-type: incoming-webhook
                  payload: |
                      {
                        "attachments": [
                          {
                            "color": "${{ steps.status.outputs.color }}",
                            "blocks": [
                              {
                                "type": "header",
                                "text": {
                                  "type": "plain_text",
                                  "text": "${{ steps.status.outputs.emoji }} CI Pipeline — ${{ steps.status.outputs.result }}"
                                }
                              },
                              {
                                "type": "section",
                                "fields": [
                                  { "type": "mrkdwn", "text": "*Repo:*\n${{ github.repository }}" },
                                  { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                                  { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                                  { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                                ]
                              },
                              {
                                "type": "section",
                                "fields": [
                                  { "type": "mrkdwn", "text": "*Checks:* ${{ needs.checks.result }}" },
                                  { "type": "mrkdwn", "text": "*Build:* ${{ needs.build.result }}" },
                                  { "type": "mrkdwn", "text": "*E2E:* ${{ needs.e2e.result }}" },
                                  { "type": "mrkdwn", "text": "*Docker:* ${{ needs.docker.result }}" }
                                ]
                              },
                              {
                                "type": "actions",
                                "elements": [
                                  {
                                    "type": "button",
                                    "text": { "type": "plain_text", "text": "View Run" },
                                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                  }
                                ]
                              }
                            ]
                          }
                        ]
                      }
